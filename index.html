<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Uptime Bot - Admin Panel</title>
    <!-- Telegram Web App JS -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <!-- Tailwind CSS for Professional UI -->
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-white font-sans antialiased p-4">

    <div class="max-w-md mx-auto mt-5">
        <!-- Header -->
        <div class="text-center mb-6">
            <h1 class="text-3xl font-bold text-blue-500">⚙️ Admin Panel</h1>
            <p class="text-gray-400 text-sm mt-1">Manage your Uptime Bot seamlessly</p>
        </div>

        <!-- Broadcast Section -->
        <div class="bg-gray-800 p-5 rounded-2xl shadow-lg border border-gray-700 mb-5">
            <h2 class="text-xl font-semibold mb-3 text-gray-200">📢 Broadcast Message</h2>
            <p class="text-xs text-gray-400 mb-3">সব ইউজারকে একসাথে মেসেজ পাঠান।</p>
            <textarea id="broadcastMsg" rows="4" class="w-full bg-gray-900 text-white rounded-lg p-3 border border-gray-600 focus:outline-none focus:border-blue-500 transition-colors" placeholder="Type your message here..."></textarea>
            <button onclick="sendBroadcast()" class="mt-4 w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-2.5 px-4 rounded-xl transition-all shadow-md">
                Send Broadcast
            </button>
        </div>

        <!-- Direct Message to User -->
        <div class="bg-gray-800 p-5 rounded-2xl shadow-lg border border-gray-700">
            <h2 class="text-xl font-semibold mb-3 text-gray-200">👤 Message to User</h2>
            <input type="number" id="userId" class="w-full bg-gray-900 text-white rounded-lg p-3 mb-3 border border-gray-600 focus:outline-none focus:border-green-500 transition-colors" placeholder="User ID (e.g., 7675471513)">
            <textarea id="userMsg" rows="2" class="w-full bg-gray-900 text-white rounded-lg p-3 border border-gray-600 focus:outline-none focus:border-green-500 transition-colors" placeholder="Type message for this user..."></textarea>
            <button onclick="sendDirectMessage()" class="mt-4 w-full bg-green-600 hover:bg-green-700 text-white font-bold py-2.5 px-4 rounded-xl transition-all shadow-md">
                Send Message
            </button>
        </div>
    </div>

    <script>
        // Initialize Telegram Web App
        let tg = window.Telegram.WebApp;
        tg.expand(); // Make it full screen

        // Broadcast Function
        function sendBroadcast() {
            let msg = document.getElementById("broadcastMsg").value;
            if (!msg) {
                tg.showAlert("দয়া করে একটি মেসেজ লিখুন!");
                return;
            }
            // Prepare Data to send back to Bot
            let data = {
                action: "broadcast",
                message: msg
            };
            tg.sendData(JSON.stringify(data));
        }

        // Direct Message Function
        function sendDirectMessage() {
            let uid = document.getElementById("userId").value;
            let msg = document.getElementById("userMsg").value;
            if (!uid || !msg) {
                tg.showAlert("User ID এবং Message দুটোই পূরণ করুন!");
                return;
            }
            let data = {
                action: "direct_message",
                user_id: parseInt(uid),
                message: msg
            };
            tg.sendData(JSON.stringify(data));
        }
    </script>
</body>
</html>
